<!--
pages/about.html

Modification():

- Removed Skills 區塊（<section data-skills>）：
  依照需求移除首頁「不再出現下方的 skill」的一致化要求，
  about.html 的技能進度條區塊也一併移除，保留興趣標籤（tag-row）
- Changed favicon 由佔位圖改為真實頭像 CDN 連結
- Changed title 隨網站品牌名稱調整為「關於 | Miki's website」

Description:

首頁「About」卡片的延伸頁面，展示完整自我介紹段落與興趣標籤。
內容來自 config/site.json 的 about.fullBio 與 about.tags 欄位，
調整介紹文字或標籤只需修改 JSON，無需改動此 HTML。
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>關於 | Miki's website</title>
  <meta name="description" content="Miki 的完整自我介紹。">
  <link rel="icon" href="https://cdn.discordapp.com/avatars/839381498351190036/3ea0f92ec08c0cc642cd90df9aee3634.png?size=2048&quality=lossless">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="firefly-field" data-firefly-field aria-hidden="true"></div>

  <nav class="site-nav glass" data-site-nav>
    <div class="site-nav__inner">
      <a href="/index.html" class="site-nav__brand" data-nav-brand aria-label="回到首頁"></a>
      <div class="site-nav__links" data-nav-links></div>
    </div>
  </nav>

  <main class="container"
        style="padding-top:calc(var(--nav-height) + var(--space-xl));padding-bottom:var(--space-xl)">

    <a class="back-link" href="/index.html">
      <i class="fa-solid fa-arrow-left"></i> 回到首頁
    </a>

    <!--
      [data-about-full] 由 renderAboutFull 填入：
      greeting（關於我）、fullBio 段落、tags 興趣標籤。
      Skills 區塊已移除，不再有 [data-skills] 容器。
    -->
    <section class="glass card" data-about-full data-reveal></section>

  </main>

  <footer class="site-footer container">
    <p class="site-footer__quote" data-quote></p>
    <div data-footer></div>
  </footer>

  <script src="/js/loader.js"></script>
  <script src="/js/render.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/animation.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
