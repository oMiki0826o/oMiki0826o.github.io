<!--
pages/projects.html

Modification():

- Changed favicon 由佔位圖改為真實頭像 CDN 連結
- Changed title 隨網站品牌名稱調整為「Projects | Miki's website」

Description:

讀取 config/projects.json 並以緊湊 mini-card 網格呈現，
新增專案只需在 JSON 陣列新增一筆物件，無需修改此 HTML。
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>Projects | Miki's website</title>
  <meta name="description" content="Miki 開發過的專案總覽。">
  <link rel="icon" href="https://cdn.discordapp.com/avatars/839381498351190036/3ea0f92ec08c0cc642cd90df9aee3634.png?size=2048&quality=lossless">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="firefly-field" data-firefly-field aria-hidden="true"></div>

  <nav class="site-nav glass" data-site-nav>
    <div class="site-nav__inner">
      <a href="/index.html" class="site-nav__brand" data-nav-brand aria-label="回到首頁"></a>
      <div class="site-nav__links" data-nav-links></div>
    </div>
  </nav>

  <main class="container" style="padding-top:calc(var(--nav-height) + var(--space-xl));padding-bottom:var(--space-xl)">
    <a class="back-link" href="/index.html"><i class="fa-solid fa-arrow-left"></i> 回到首頁</a>
    <h1 class="hero__name" style="font-size:1.8rem;margin-bottom:var(--space-md)" data-reveal>Projects</h1>
    <!-- [data-project-grid] 觸發 projects.json 載入並渲染 mini-card -->
    <div class="card-grid" data-project-grid></div>
  </main>

  <footer class="site-footer container">
    <p class="site-footer__quote" data-quote></p>
    <div data-footer></div>
  </footer>

  <script src="/js/loader.js"></script>
  <script src="/js/render.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/animation.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
